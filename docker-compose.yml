services:
  postgres:
    image: postgres:16
    container_name: estradao-postgres
    environment:
      POSTGRES_DB: estradao
      POSTGRES_USER: estradao
      POSTGRES_PASSWORD: estradao123
    ports:
      - "5433:5432"
    volumes:
      - estradao_data:/var/lib/postgresql/data

volumes:
  estradao_data:
